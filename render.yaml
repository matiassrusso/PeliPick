services:
  - type: web
    name: pelipick-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BUTACA_ALLOWED_ORIGINS
        value: https://butaca.xyz,https://www.butaca.xyz,https://pelipick.vercel.app
      - key: DATABASE_URL
        sync: false
